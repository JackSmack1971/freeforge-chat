name: Node Tests

on:
  push:
    branches:
      - main
      - 'test-issue-*'
      - 'fix-issue-*'
      - 'chore-issue-*'
  pull_request:

jobs:
  node-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run security-focused Node test suite
        run: node --test tests/security/*.test.mjs
