name: Biome Check

on:
  push:
    branches:
      - main
      - 'fix/issue-*'
      - 'test/issue-*'
      - 'chore/issue-*'
  pull_request:

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run zero-install Biome lint pass
        run: npx --yes @biomejs/biome check freeforge/src tests/security
