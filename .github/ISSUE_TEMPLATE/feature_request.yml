name: Feature request
description: Suggest a new capability or improvement.
title: 'feat: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or gap does this address?
      placeholder: Describe the current limitation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
      placeholder: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional.
      placeholder: Other approaches you considered.
