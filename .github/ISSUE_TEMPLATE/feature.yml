name: Feature request
description: Suggest an improvement or new capability
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user need or workflow gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful solution.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add tradeoffs, alternatives, or constraints.
