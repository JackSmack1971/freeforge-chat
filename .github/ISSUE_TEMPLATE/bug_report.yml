name: Bug report
description: Report a reproducible problem with the app.
title: 'bug: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app.
        2. Do the thing.
        3. Observe the failure.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 125, Firefox 127, Safari 17, etc.
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or console output
      description: Add anything that helps reproduce or confirm the bug.
