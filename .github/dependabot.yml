version: 2
updates:
  - package-ecosystem: npm
    directory: /freeforge
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - enhancement
    groups:
      freeforge-npm:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - enhancement
    groups:
      github-actions:
        patterns:
          - '*'
